<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graded 1: Movie Rating</title>
    <link rel="stylesheet" href="./MR.css">
</head>
<body>
    <h1>Graded 1: Movie Rating</h1>
    <div class="container">
        <form id="movieForm">
        <div >
            <label for="movieTitle">Movie Title:</label>
            <input type="text" id="movieTitle" name="movieTitle" placeholder="Enter movie title" required><br><br>
        </div>
        <div>
            <label for="movieYear">Year:</label>
            <input type="number" id="movieYear" name="movieYear" placeholder="Enter release year" required><br><br>
        </div>
            <div>
            <label for="movieGenre">Genre:</label>
            <select id="movieGenre" name="movieGenre" required>
                <option value="">Select genre</option>
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Horror">Horror</option>
                <option value="Sci-Fi">Sci-Fi</option>
                <option value="Romance">Romance</option>
                <option value="Documentary">Documentary</option>
            </select><br><br>
            </div>
            <div class="Rating" id="Rating">
                <span class="star" data-value="1">&#9733;</span>
                <span class="star" data-value="2">&#9733;</span>
                <span class="star" data-value="3">&#9733;</span>
                <span class="star" data-value="4">&#9733;</span>
                <span class="star" data-value="5">&#9733;</span>
            </div>
            <div>
            <button type="submit">Add Movie</button>
            </div>
            </form>
            <div>
                <h2>Movie List</h2>
                <ul id="movieList"></ul>
            </div>
        
    </div>

    <script src="./MR.js"></script>
</body>


</html>
